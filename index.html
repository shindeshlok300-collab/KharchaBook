<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Expenses"/>
<meta name="theme-color" content="#6366F1"/>
<title>Smart Expense Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--a:#6366F1;--g:#10B981;--r:#E85D4A;--y:#F59E0B;--rad:14px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;transition:background .2s,color .2s}
body.light{--bg:#F8FAFC;--s:#fff;--s2:#F1F5F9;--b:rgba(0,0,0,0.08);--t:#0F172A;--m:#64748B}
body.dark{--bg:#0F172A;--s:#1E293B;--s2:#263045;--b:rgba(255,255,255,0.08);--t:#F1F5F9;--m:#94A3B8}
body{background:var(--bg);color:var(--t)}

input,select,textarea{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  font-size:16px;
  color:var(--t);
  background:var(--s2);
  border:1px solid var(--b);
  border-radius:12px;
  padding:13px 14px;
  width:100%;
  display:block;
  -webkit-appearance:none;
  appearance:none;
  outline:none;
  touch-action:manipulation;
  -webkit-user-select:text;
  user-select:text;
}
input:focus,select:focus,textarea:focus{border-color:var(--a);background:var(--s);outline:none}
input[type=color]{padding:4px;height:46px;cursor:pointer}
input[type=file]{display:none}
input[type=date]{-webkit-appearance:none;appearance:none}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}

button{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  font-size:14px;font-weight:600;
  border:none;border-radius:12px;
  padding:13px 18px;cursor:pointer;
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
  transition:opacity .15s;
  -webkit-appearance:none;
}
button:active{opacity:.75}
.bp{background:var(--a);color:#fff}
.bg{background:var(--g);color:#fff}
.br{background:var(--r);color:#fff}
.bgh{background:var(--s2);color:var(--m);border:1px solid var(--b)}

.card{background:var(--s);border:1px solid var(--b);border-radius:var(--rad)}
.row{display:flex;align-items:center;gap:12px;padding:13px 16px}
.badge{border-radius:999px;padding:3px 9px;font-size:11px;font-weight:700}
.pill-bar{display:flex;background:var(--s2);border-radius:999px;padding:4px;gap:2px;overflow-x:auto;scrollbar-width:none}
.pill-bar::-webkit-scrollbar{display:none}
.pill{background:transparent;color:var(--m);border-radius:999px;padding:8px 14px;font-size:13px;font-weight:500;border:none;cursor:pointer;white-space:nowrap;touch-action:manipulation}
.pill.on{background:#1E293B;color:#fff;font-weight:700}
body.dark .pill.on{background:#334155}

.tile{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.bwrap{height:8px;background:var(--s2);border-radius:4px;overflow:hidden;margin-top:6px}
.bfill{height:100%;border-radius:4px}
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}

#toast{position:fixed;top:max(env(safe-area-inset-top),16px);left:50%;transform:translateX(-50%);background:#1E293B;color:#fff;border-radius:999px;padding:10px 22px;font-size:13px;font-weight:600;z-index:9999;white-space:nowrap;box-shadow:0 4px 24px rgba(0,0,0,.25);opacity:0;transition:opacity .25s;pointer-events:none}
#toast.show{opacity:1}
#sync{position:fixed;top:max(env(safe-area-inset-top),12px);right:14px;font-size:11px;font-weight:700;border-radius:999px;padding:4px 10px;z-index:998;opacity:0;transition:all .3s;pointer-events:none}
#sync.on{opacity:1}
#sync.saving{background:#FFFBEB;color:#6B3A00}
#sync.saved{background:#ECFDF5;color:#065F46}
#sync.err{background:#FEF0EE;color:#7A2518}

/* AUTH */
#auth-wrap,#forgot-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
#forgot-wrap{display:none}
.acard{background:var(--s);border:1px solid var(--b);border-radius:20px;padding:32px 26px;width:100%;max-width:400px}
.ath{font-size:22px;font-weight:800;margin-bottom:4px}
.asub{font-size:13px;color:var(--m);margin-bottom:22px;line-height:1.5}
.atabs{display:flex;background:var(--s2);border-radius:999px;padding:4px;gap:2px;margin-bottom:20px}
.atab{flex:1;text-align:center;padding:9px;border:none;border-radius:999px;font-size:14px;font-weight:500;background:transparent;color:var(--m);cursor:pointer;touch-action:manipulation}
.atab.on{background:var(--s);color:var(--t);font-weight:700;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.amsg{font-size:13px;border-radius:10px;padding:10px 14px;margin-bottom:14px;line-height:1.5;display:none}
.amsg.err{background:#FEF0EE;color:#7A2518;display:block}
.amsg.ok{background:#ECFDF5;color:#065F46;display:block}
.aor{display:flex;align-items:center;gap:10px;margin:16px 0}
.aor-l{flex:1;height:1px;background:var(--b)}
.flink{text-align:center;font-size:13px;color:var(--a);cursor:pointer;margin-top:12px;font-weight:600;touch-action:manipulation}

/* APP */
#app-wrap{display:none}
#shell{max-width:660px;margin:0 auto;padding:16px 16px 110px}
#bnav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--s);border-top:1px solid var(--b);padding:8px 0 calc(8px + env(safe-area-inset-bottom));z-index:200;justify-content:space-around}
#bnav button{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:600;color:var(--m);padding:4px 10px;min-width:56px;touch-action:manipulation;border-radius:10px}
#bnav button.on{color:var(--a)}
.ni{font-size:22px}

@media(max-width:599px){#bnav{display:flex}#top-tabs{display:none!important}#shell{padding:12px 12px 100px}}
@media(min-width:600px){#bnav{display:none!important}#top-tabs{display:flex!important}}

.fb-box{background:var(--s2);border-radius:12px;padding:16px;margin-top:14px}
.fb-item{display:flex;gap:10px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--b)}
.fb-item:last-child{border:none;margin:0;padding:0}
</style>
</head>
<body class="light">
<div id="toast"></div>
<div id="sync"></div>

<!-- FORGOT PASSWORD -->
<div id="forgot-wrap">
  <div class="acard">
    <div style="font-size:36px;margin-bottom:8px">🔑</div>
    <div class="ath">Reset password</div>
    <div class="asub">Enter your email and we'll send a reset link.</div>
    <div id="forgot-msg"></div>
    <div style="margin-bottom:14px">
      <input type="email" id="forgot-email" placeholder="Email address" autocomplete="email" style="font-size:16px"/>
    </div>
    <button class="bp" id="forgot-btn" style="width:100%;padding:14px;font-size:16px" onclick="sendReset()">Send reset link</button>
    <div class="flink" onclick="showAuth()" style="margin-top:14px">← Back to login</div>
  </div>
</div>

<!-- AUTH -->
<div id="auth-wrap">
  <div class="acard">
    <div style="font-size:36px;margin-bottom:8px">💸</div>
    <div class="ath">Expense Tracker</div>
    <div class="asub">Track spending, set budgets, get insights — synced across all your devices.</div>
    <div class="atabs">
      <button class="atab on" id="atab-login" onclick="setAuthMode('login')">Login</button>
      <button class="atab" id="atab-signup" onclick="setAuthMode('signup')">Sign Up</button>
    </div>
    <div id="auth-msg"></div>
    <div style="display:flex;flex-direction:column;gap:12px;margin-bottom:16px">
      <input type="email" id="f-email" placeholder="Email address" autocomplete="email" style="font-size:16px"/>
      <input type="password" id="f-pw" placeholder="Password" autocomplete="current-password" style="font-size:16px"/>
      <input type="password" id="f-pw2" placeholder="Confirm password" autocomplete="new-password" style="display:none;font-size:16px"/>
    </div>
    <button class="bp" id="auth-btn" style="width:100%;padding:14px;font-size:16px" onclick="authSubmit()">Login</button>
    <div class="flink" id="forgot-link" onclick="showForgot()">Forgot password?</div>
    <div class="aor"><div class="aor-l"></div><span style="font-size:11px;color:var(--m)">or</span><div class="aor-l"></div></div>
    <button class="bgh" onclick="goOffline()" style="width:100%;padding:13px;font-size:14px">Continue offline (local only)</button>
  </div>
</div>

<!-- APP -->
<div id="app-wrap">
  <div id="shell">
    <div id="hdr"></div>
    <div id="top-tabs" class="pill-bar" style="margin-bottom:18px;display:none"></div>

    <!-- ADD TAB — permanently in DOM -->
    <div id="tab-add" style="display:none">
      <div class="card" style="padding:18px;margin-bottom:18px">
        <p style="font-weight:700;font-size:16px;margin-bottom:16px">New Expense</p>
        <div style="display:flex;flex-direction:column;gap:12px">
          <div>
            <input type="text" id="i-desc" placeholder="What did you spend on? (e.g. Zomato)"
              autocomplete="off" autocorrect="off" autocapitalize="sentences" spellcheck="false" style="font-size:16px"/>
            <div id="cat-preview" style="font-size:12px;font-weight:600;margin-top:6px;min-height:18px"></div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <input type="number" id="i-amt" placeholder="Amount (₹)" inputmode="decimal" min="0" step="any" style="font-size:16px"/>
            <input type="date" id="i-date" style="font-size:16px"/>
          </div>
          <select id="i-cat" style="font-size:16px;background:var(--s2);color:var(--t)"></select>
          <button class="bp" id="btn-add" style="width:100%;padding:15px;font-size:16px">+ Add Expense</button>
        </div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <p style="font-weight:700;font-size:15px">Recent Expenses</p>
        <span id="exp-count" style="font-size:12px;color:var(--m)"></span>
      </div>
      <div class="card" style="overflow:hidden;padding:0" id="recent-list"></div>
    </div>

    <!-- BUDGETS TAB — permanently in DOM -->
    <div id="tab-budgets" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <p style="font-size:13px;color:var(--m)">Edit amount then tap ✓</p>
        <button class="bp" id="btn-newcat" style="font-size:13px;padding:10px 16px">+ New category</button>
      </div>
      <div id="newcat-form" style="display:none">
        <div class="card" style="padding:18px;margin-bottom:14px;border-color:var(--a)">
          <p style="font-weight:700;font-size:14px;color:var(--a);margin-bottom:14px">Add Custom Category</p>
          <div style="display:flex;flex-direction:column;gap:10px">
            <input type="text" id="i-newcat" placeholder="Category name" autocomplete="off" style="font-size:16px"/>
            <div style="display:flex;gap:10px">
              <input type="text" id="i-newicon" placeholder="Emoji" value="🏷" style="width:80px;text-align:center;font-size:20px"/>
              <input type="color" id="i-newcolor" value="#6366F1" style="flex:1"/>
            </div>
            <div style="display:flex;gap:10px">
              <button class="bp" id="btn-addcat" style="flex:1">Add</button>
              <button class="bgh" id="btn-cancelcat" style="flex:1">Cancel</button>
            </div>
          </div>
        </div>
      </div>
      <div class="card" style="overflow:hidden;padding:0" id="bud-list"></div>
    </div>

    <!-- DYNAMIC TABS (Dashboard, Reports) -->
    <div id="content" style="display:none"></div>
  </div>
  <nav id="bnav"></nav>
</div>

<script>
const {createClient}=supabase;
const sb=createClient("https://bymzxsrlfirxynwidoyc.supabase.co","sb_publishable_SqZJ79X9qhfThpaWy8KXMw_glLvyx27");

const TABS=[{l:"Add",i:"➕"},{l:"Dashboard",i:"📊"},{l:"Reports",i:"📅"},{l:"Budgets",i:"🎯"}];

const DC={
  Food:{kw:["zomato","swiggy","food","restaurant","cafe","lunch","dinner","breakfast","chai","pizza","burger","meal","eat","grocery","blinkit","zepto","bigbasket","milk","vegetable","fruit","snack","coffee","tea","dine"],color:"#E85D4A",light:"#FEF0EE",dark:"#7A2518",icon:"🍽"},
  Transport:{kw:["uber","ola","rapido","auto","cab","taxi","metro","bus","train","fuel","petrol","diesel","parking","flight","irctc","ticket","travel"],color:"#3B82F6",light:"#EFF6FF",dark:"#1E3A6E",icon:"🚗"},
  Entertainment:{kw:["netflix","prime","hotstar","spotify","youtube","movie","film","cinema","pvr","inox","game","gaming","concert","show","jiocinema","subscription","ott"],color:"#8B5CF6",light:"#F5F3FF",dark:"#3B1F6E",icon:"🎬"},
  Shopping:{kw:["amazon","flipkart","myntra","ajio","meesho","clothes","shirt","dress","shoe","bag","watch","jewel","nykaa","purse","accessory","fashion","apparel","mall"],color:"#EC4899",light:"#FDF2F8",dark:"#6D1A42",icon:"🛍"},
  Health:{kw:["gym","fitness","yoga","medicine","pharmacy","doctor","hospital","clinic","medical","apollo","1mg","netmeds","health","wellness","supplement","vitamin"],color:"#10B981",light:"#ECFDF5",dark:"#065F46",icon:"💊"},
  Utilities:{kw:["electricity","water","internet","wifi","jio","airtel","vi","phone","bill","recharge","gas","lpg","maintenance","rent","emi","loan"],color:"#F59E0B",light:"#FFFBEB",dark:"#6B3A00",icon:"⚡"},
  Education:{kw:["course","udemy","coursera","book","study","school","college","tuition","class","exam","fee","notebook","learn","skill","training"],color:"#06B6D4",light:"#ECFEFF",dark:"#0E4C5A",icon:"📚"},
  Other:{kw:[],color:"#6B7280",light:"#F9FAFB",dark:"#374151",icon:"📦"},
};
const DB={Food:8000,Transport:3000,Entertainment:2000,Shopping:5000,Health:2000,Utilities:3000,Education:2000,Other:1000};

let user=null,offline=false,syncTmr=null;
let S={
  dark:JSON.parse(localStorage.getItem("et_dark")||"false"),
  tab:0,
  expenses:JSON.parse(localStorage.getItem("et_exp")||"[]"),
  cats:JSON.parse(localStorage.getItem("et_cats")||JSON.stringify(DC)),
  budgets:JSON.parse(localStorage.getItem("et_bud")||JSON.stringify(DB)),
  period:"monthly",
};

// ── Utils ──
const fmt=n=>"₹"+Math.round(n).toLocaleString("en-IN");
const q=id=>document.getElementById(id);
function categorize(desc){
  const d=desc.toLowerCase();
  for(const[c,i]of Object.entries(S.cats)){if(c==="Other")continue;if((i.kw||[]).some(k=>d.includes(k)))return c;}
  return"Other";
}
function getPKey(d){
  if(S.period==="weekly"){const dt=new Date(d),dy=dt.getDay(),df=dt.getDate()-dy+(dy===0?-6:1);return new Date(dt.setDate(df)).toISOString().slice(0,10);}
  if(S.period==="monthly")return d.slice(0,7);
  if(S.period==="quarterly"){const m=parseInt(d.slice(5,7)),y=d.slice(0,4);return`${y}-Q${Math.ceil(m/3)}`;}
  return d.slice(0,4);
}
function catTotals(){return S.expenses.reduce((a,e)=>{a[e.cat]=(a[e.cat]||0)+e.amount;return a;},{});}
const totalSpend=()=>Object.values(catTotals()).reduce((a,b)=>a+b,0);
const totalBudget=()=>Object.values(S.budgets).reduce((a,b)=>a+b,0);

let toastTmr;
function toast(msg){const el=q("toast");el.textContent=msg;el.classList.add("show");clearTimeout(toastTmr);toastTmr=setTimeout(()=>el.classList.remove("show"),2600);}

function showSync(st){
  const el=q("sync");el.className="sync on "+st;
  el.textContent=st==="saving"?"⏳ Saving":st==="saved"?"✓ Saved":"⚠ Error";
  if(st==="saved")setTimeout(()=>{el.className="sync";},2200);
}
function applyTheme(){document.body.className=S.dark?"dark":"light";}

// ── Save ──
async function save(){
  localStorage.setItem("et_exp",JSON.stringify(S.expenses));
  localStorage.setItem("et_bud",JSON.stringify(S.budgets));
  localStorage.setItem("et_cats",JSON.stringify(S.cats));
  localStorage.setItem("et_dark",JSON.stringify(S.dark));
  if(!user||offline)return;
  showSync("saving");
  try{
    const{error}=await sb.from("user_data").upsert({user_id:user.id,data:JSON.stringify({expenses:S.expenses,cats:S.cats,budgets:S.budgets,dark:S.dark}),updated_at:new Date().toISOString()},{onConflict:"user_id"});
    if(error)throw error;
    showSync("saved");
  }catch(e){showSync("err");console.warn(e);}
}
function dsave(){clearTimeout(syncTmr);syncTmr=setTimeout(save,700);}

async function loadCloud(){
  if(!user)return;
  try{
    const{data,error}=await sb.from("user_data").select("data").eq("user_id",user.id).single();
    if(error||!data)return;
    const d=JSON.parse(data.data);
    if(d.expenses)S.expenses=d.expenses;
    if(d.cats)S.cats=d.cats;
    if(d.budgets)S.budgets=d.budgets;
    if(d.dark!==undefined)S.dark=d.dark;
  }catch(e){console.warn("Cloud load failed",e);}
}

// ── Auth ──
let authMode="login";
function setAuthMode(m){
  authMode=m;
  q("atab-login").className="atab"+(m==="login"?" on":"");
  q("atab-signup").className="atab"+(m==="signup"?" on":"");
  q("auth-btn").textContent=m==="login"?"Login":"Create Account";
  q("f-pw2").style.display=m==="signup"?"block":"none";
  q("forgot-link").style.display=m==="login"?"block":"none";
  q("auth-msg").className="";q("auth-msg").textContent="";
}
function showAuthMsg(msg,type="err"){const el=q("auth-msg");el.textContent=msg;el.className="amsg "+(type==="ok"?"ok":"err");}
function showForgot(){q("auth-wrap").style.display="none";q("forgot-wrap").style.display="flex";}
function showAuth(){q("forgot-wrap").style.display="none";q("auth-wrap").style.display="flex";}

async function authSubmit(){
  const email=q("f-email").value.trim();
  const pw=q("f-pw").value;
  if(!email||!pw){showAuthMsg("Please fill in all fields.");return;}
  q("auth-btn").textContent="Please wait…";q("auth-btn").disabled=true;
  if(authMode==="signup"){
    const pw2=q("f-pw2").value;
    if(pw!==pw2){showAuthMsg("Passwords don't match.");resetAuthBtn();return;}
    if(pw.length<6){showAuthMsg("Password must be at least 6 characters.");resetAuthBtn();return;}
    const{error}=await sb.auth.signUp({email,password:pw});
    if(error){showAuthMsg(error.message);resetAuthBtn();return;}
    showAuthMsg("✓ Check your email to confirm, then login.","ok");
    setAuthMode("login");resetAuthBtn();return;
  }
  const{data,error}=await sb.auth.signInWithPassword({email,password:pw});
  if(error){showAuthMsg(error.message);resetAuthBtn();return;}
  user=data.user;await loadCloud();launch();
}
function resetAuthBtn(){const b=q("auth-btn");b.textContent=authMode==="login"?"Login":"Create Account";b.disabled=false;}
function goOffline(){offline=true;user=null;launch();}

async function sendReset(){
  const email=q("forgot-email").value.trim();
  const msg=q("forgot-msg");
  if(!email){msg.textContent="Enter your email.";msg.className="amsg err";return;}
  q("forgot-btn").textContent="Sending…";q("forgot-btn").disabled=true;
  const{error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:window.location.href});
  q("forgot-btn").textContent="Send reset link";q("forgot-btn").disabled=false;
  if(error){msg.textContent=error.message;msg.className="amsg err";}
  else{msg.textContent="✓ Reset link sent! Check your inbox.";msg.className="amsg ok";}
}

async function doLogout(){
  await sb.auth.signOut();user=null;offline=false;
  S.expenses=[];S.cats=JSON.parse(JSON.stringify(DC));S.budgets=JSON.parse(JSON.stringify(DB));
  q("app-wrap").style.display="none";
  q("auth-wrap").style.display="flex";
  toast("Logged out.");
}

// ── Launch ──
function launch(){
  q("auth-wrap").style.display="none";q("forgot-wrap").style.display="none";
  q("app-wrap").style.display="block";
  applyTheme();
  q("i-date").value=new Date().toISOString().slice(0,10);
  setupAddTab();
  setupBudgetsTab();
  renderHeader();
  renderNav();
  setTab(0);
}

(async()=>{
  const{data:{session}}=await sb.auth.getSession();
  if(session){user=session.user;await loadCloud();launch();}
})();

// ── Add Tab setup (wired once) ──
function setupAddTab(){
  populateCatSelect();
  q("i-desc").oninput=()=>{
    const det=q("i-cat").value||categorize(q("i-desc").value||"x");
    const info=S.cats[det]||DC.Other;
    const prev=q("cat-preview");
    if(q("i-desc").value){prev.textContent=`→ ${det}`;prev.style.color=info.color;}
    else prev.textContent="";
  };
  q("btn-add").onclick=addExpense;
}

function populateCatSelect(){
  const sel=q("i-cat");if(!sel)return;
  const cur=sel.value;
  sel.innerHTML=`<option value="">Auto-detect category</option>`+
    Object.entries(S.cats).map(([cat,ci])=>`<option value="${cat}">${ci.icon} ${cat}</option>`).join("");
  if(cur)sel.value=cur;
}

// ── Budgets Tab setup (wired once, list re-rendered) ──
function setupBudgetsTab(){
  q("btn-newcat").onclick=()=>{
    const f=q("newcat-form");
    f.style.display=f.style.display==="none"?"block":"none";
  };
  q("btn-addcat").onclick=addCat;
  q("btn-cancelcat").onclick=()=>{q("newcat-form").style.display="none";};
}

// ── Actions ──
function addExpense(){
  const desc=q("i-desc").value.trim();
  const amt=parseFloat(q("i-amt").value);
  const date=q("i-date").value;
  const cat=q("i-cat").value||categorize(desc);
  if(!desc||isNaN(amt)||amt<=0){toast("Enter a valid description and amount.");return;}
  S.expenses.unshift({id:Date.now(),desc,amount:amt,date,cat});
  dsave();
  q("i-desc").value="";q("i-amt").value="";q("i-cat").value="";q("cat-preview").textContent="";
  toast(`Added to ${cat}!`);
  renderRecentList();
  q("exp-count").textContent=S.expenses.length+" total";
}

function delExp(id){
  S.expenses=S.expenses.filter(e=>e.id!=id);
  dsave();renderRecentList();
  q("exp-count").textContent=S.expenses.length+" total";
}

function startEditExp(id){
  const exp=S.expenses.find(e=>e.id==id);if(!exp)return;
  const row=document.querySelector(`[data-id="${id}"]`);if(!row)return;
  const ci=S.cats[exp.cat]||DC.Other;
  row.innerHTML=`
    <div class="tile" style="background:${S.dark?ci.dark:ci.light}">${ci.icon}</div>
    <div style="flex:1;min-width:0;padding-right:8px">
      <div style="font-size:13px;font-weight:600;margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${exp.desc}</div>
      <input type="number" inputmode="decimal" value="${exp.amount}" id="edit-amt-${id}"
        style="font-size:16px;padding:10px 12px;width:100%"/>
    </div>
    <div style="display:flex;gap:6px;flex-shrink:0">
      <button class="bg" onclick="saveEditAmt(${id})" style="padding:10px 12px">✓</button>
      <button class="bgh" onclick="renderRecentList()" style="padding:10px 12px">✕</button>
    </div>`;
  setTimeout(()=>{const el=q(`edit-amt-${id}`);if(el){el.focus();el.select();}},50);
}

function saveEditAmt(id){
  const el=q(`edit-amt-${id}`);if(!el)return;
  const v=parseFloat(el.value);
  if(isNaN(v)||v<=0){toast("Invalid amount");return;}
  S.expenses=S.expenses.map(e=>e.id==id?{...e,amount:v}:e);
  dsave();renderRecentList();toast("Updated!");
}

function saveBudget(cat){
  const el=q(`bud-${CSS.escape(cat)}`);if(!el)return;
  const v=parseFloat(el.value);
  if(isNaN(v)||v<0){toast("Enter a valid amount");return;}
  S.budgets[cat]=v;
  dsave();toast(`${cat} budget updated!`);
  // re-render dashboard bars if visible
  if(S.tab===1)renderDynamic();
}

function addCat(){
  const name=q("i-newcat").value.trim();
  if(!name){toast("Enter a category name");return;}
  const color=q("i-newcolor").value;
  const icon=q("i-newicon").value||"🏷";
  S.cats[name]={kw:[],color,light:"#F5F3FF",dark:"#2D1B69",icon};
  S.budgets[name]=2000;
  dsave();
  q("i-newcat").value="";q("i-newicon").value="🏷";
  q("newcat-form").style.display="none";
  populateCatSelect();
  renderBudgetList();
  toast(`"${name}" added!`);
}

function downloadExcel(){
  if(!S.expenses.length){toast("No expenses to export");return;}
  const ct=catTotals();const ts=totalSpend();
  const rows=[["Date","Description","Category","Amount (INR)"].join("\t"),
    ...S.expenses.map(e=>[e.date,e.desc,e.cat,e.amount].join("\t")),
    "","Category Summary",["Category","","","Total"].join("\t"),
    ...Object.entries(ct).map(([c,a])=>[c,"","",a].join("\t")),
    "",["","","Grand Total",ts].join("\t")].join("\n");
  const blob=new Blob(["\uFEFF"+rows],{type:"application/vnd.ms-excel;charset=utf-8"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download=`expenses_${new Date().toISOString().slice(0,10)}.xls`;a.click();
  toast("Downloading!");
}

function importFile(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const lines=ev.target.result.split("\n").map(l=>l.trim()).filter(Boolean);
      const data=lines.filter(l=>/^\d{4}-\d{2}-\d{2}/.test(l)).map(l=>{
        const[date,desc,cat,amt]=l.split("\t");const amount=parseFloat(amt);
        if(!date||!desc||isNaN(amount))return null;
        return{id:Date.now()+Math.random(),date:date.trim(),desc:desc.trim(),cat:(cat||"Other").trim(),amount};
      }).filter(Boolean);
      if(!data.length){toast("No valid data found");return;}
      const merged=[...data,...S.expenses].filter((e,i,arr)=>arr.findIndex(x=>x.date===e.date&&x.desc===e.desc&&x.amount===e.amount)===i);
      S.expenses=merged;dsave();
      if(S.tab===0)renderRecentList();
      else renderDynamic();
      toast(`Imported ${data.length} expenses!`);
    }catch{toast("Failed to parse file.");}
    input.value="";
  };
  reader.readAsText(file);
}

// ── Feedback engine ──
function generateFeedback(){
  const ct=catTotals();const ts=totalSpend();const tb=totalBudget();
  const items=[];
  const pct=tb>0?Math.round((ts/tb)*100):0;
  if(pct===0){items.push({icon:"👋",label:"No data yet",text:"Add some expenses to get personalised feedback on your spending."});return items;}
  if(pct<60)items.push({icon:"🟢",label:"Great overall",text:`You've used ${pct}% of your total budget — you're well in control. Keep it up!`});
  else if(pct<85)items.push({icon:"🟡",label:"Doing okay",text:`You're at ${pct}% of your total budget. A few categories need attention before month-end.`});
  else if(pct<100)items.push({icon:"🟠",label:"Getting close",text:`You've used ${pct}% of your total budget. Time to pull back on discretionary spending.`});
  else items.push({icon:"🔴",label:"Over budget",text:`You've exceeded your total budget by ${fmt(ts-tb)}. Review your biggest categories immediately.`});
  const tips={Food:"Try cooking at home 2–3 days a week or switching to weekly BigBasket orders instead of daily Blinkit runs.",Transport:"Consider the metro or sharing rides — Rapido bike taxis can cut costs significantly.",Entertainment:"Rotate OTT subscriptions instead of keeping all active simultaneously.",Shopping:"Try a 24-hour rule before buying — if you still want it tomorrow, then buy.",Health:"Compare prices on 1mg vs Apollo Pharmacy — savings can be 20–30%.",Utilities:"Use PhonePe or GPay cashback offers for bill payments.",Education:"Udemy courses go on sale frequently for ₹399–499 — wait for a deal.",Other:"Review if any items here belong to a specific category."};
  const over=[],near=[];
  for(const[cat,spent]of Object.entries(ct)){
    const bud=S.budgets[cat]||0;if(!bud)continue;
    const p=Math.round((spent/bud)*100);
    if(p>100)over.push({cat,spent,bud,p});
    else if(p>75)near.push({cat,spent,bud,p});
  }
  over.sort((a,b)=>b.p-a.p);
  if(over.length){
    const top=over[0];
    items.push({icon:"🚨",label:`${top.cat} is over budget (${top.p}%)`,text:`Spent ${fmt(top.spent)} against budget of ${fmt(top.bud)}. ${tips[top.cat]||"Consider reducing spend here."}`});
    if(over.length>1)items.push({icon:"⚠️",label:`${over.length-1} more over budget`,text:over.slice(1).map(o=>`${o.cat}: ${fmt(o.spent)} / ${fmt(o.bud)}`).join(" · ")});
  }
  if(near.length)items.push({icon:"🔔",label:"Nearing limit",text:near.map(n=>`${n.cat} at ${n.p}%`).join(", ")+". Slow down here to finish the month comfortably."});
  const sorted=Object.entries(ct).sort((a,b)=>b[1]-a[1]);
  if(sorted.length&&ts>0){const[tc,ta]=sorted[0];const share=Math.round((ta/ts)*100);if(share>40)items.push({icon:"📌",label:`${tc} dominates (${share}% of total)`,text:`${fmt(ta)} spent on ${tc}. Consider if this matches your priorities.`});}
  const saved=tb-ts;
  if(saved>0)items.push({icon:"💡",label:"Savings opportunity",text:`${fmt(saved)} remains in your budget. Consider moving a portion to savings — even ₹500/month adds up over time.`});
  return items;
}

// ── Render: header & nav (lightweight, no tab flash) ──
function renderHeader(){
  const ts=totalSpend();const tb=totalBudget();
  const ul=offline?"⚡ Offline":(user?.email?`☁ ${user.email}`:"");
  q("hdr").innerHTML=`
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">
    <div>
      <h1 style="font-size:21px;font-weight:800;letter-spacing:-.5px">Expense Tracker</h1>
      <p style="font-size:12px;color:var(--m);margin-top:3px">
        ${ul?`<span style="background:${offline?"#FFFBEB":"#ECFDF5"};color:${offline?"#6B3A00":"#065F46"};border-radius:999px;padding:2px 8px;font-size:11px;font-weight:700">${ul}</span> · `:""}${fmt(ts)} spent · ${fmt(Math.max(0,tb-ts))} left
      </p>
    </div>
    <div style="display:flex;gap:8px">
      <button id="dark-btn" onclick="S.dark=!S.dark;dsave();applyTheme();q('dark-btn').textContent=S.dark?'☀':'🌙'" style="background:var(--s2);color:var(--t);border:1px solid var(--b);border-radius:999px;padding:8px 12px;font-size:14px">${S.dark?"☀":"🌙"}</button>
      ${!offline&&user?`<button onclick="doLogout()" style="background:var(--s2);color:var(--m);border:1px solid var(--b);border-radius:999px;padding:8px 12px;font-size:13px">Logout</button>`:""}
    </div>
  </div>`;
}

function renderNav(){
  const tt=q("top-tabs");
  if(tt)tt.innerHTML=TABS.map((t,i)=>`<button class="pill ${S.tab===i?"on":""}" onclick="setTab(${i})">${t.i} ${t.l}</button>`).join("");
  q("bnav").innerHTML=TABS.map((t,i)=>`<button class="${S.tab===i?"on":""}" onclick="setTab(${i})"><span class="ni">${t.i}</span>${t.l}</button>`).join("");
}

function setTab(i){
  S.tab=i;
  renderHeader();
  renderNav();
  // show/hide permanent tabs
  q("tab-add").style.display=i===0?"block":"none";
  q("tab-budgets").style.display=i===3?"block":"none";
  q("content").style.display=(i===1||i===2)?"block":"none";
  if(i===0){renderRecentList();q("exp-count").textContent=S.expenses.length+" total";}
  if(i===1||i===2)renderDynamic();
  if(i===3)renderBudgetList();
}

// ── Render: recent expenses list ──
function renderRecentList(){
  const el=q("recent-list");if(!el)return;
  if(!S.expenses.length){
    el.innerHTML=`<div style="padding:28px;text-align:center;color:var(--m);font-size:14px">No expenses yet 🎉<br/><span style="font-size:12px;margin-top:4px;display:block">Add your first one above</span></div>`;
    return;
  }
  el.innerHTML=S.expenses.slice(0,30).map((e,i,arr)=>{
    const ci=S.cats[e.cat]||DC.Other;
    return`<div class="row" data-id="${e.id}" style="${i<arr.length-1?"border-bottom:1px solid var(--b)":""}">
      <div class="tile" style="background:${S.dark?ci.dark:ci.light}">${ci.icon}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.desc}</div>
        <div style="font-size:11px;color:var(--m)">${e.cat} · ${e.date}</div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
        <span style="font-weight:700;font-size:14px;color:${ci.color}">${fmt(e.amount)}</span>
        <button onclick="startEditExp(${e.id})" style="background:${S.dark?"#1E3A6E":"#EFF6FF"};color:#3B82F6;padding:7px 10px;font-size:12px;border-radius:8px;border:none">Edit</button>
        <button onclick="delExp(${e.id})" style="background:${S.dark?"#3B1A1A":"#FEF0EE"};color:var(--r);padding:7px 10px;font-size:12px;border-radius:8px;border:none">Del</button>
      </div>
    </div>`;
  }).join("");
}

// ── Render: budget list (permanent DOM, inputs always present) ──
function renderBudgetList(){
  const el=q("bud-list");if(!el)return;
  const ct=catTotals();
  el.innerHTML=Object.entries(S.cats).map(([cat,ci],i,arr)=>{
    const budget=S.budgets[cat]||0;
    const spent=ct[cat]||0;
    const over=spent>budget&&budget>0;
    const warn=!over&&budget>0&&(spent/budget)>0.75;
    // use CSS.escape-safe id: replace spaces/special chars
    const safeId=`bud-${cat.replace(/[^a-zA-Z0-9]/g,"-")}`;
    return`<div class="row" style="${i<arr.length-1?"border-bottom:1px solid var(--b)":""}">
      <div class="tile" style="background:${S.dark?ci.dark:ci.light}">${ci.icon}</div>
      <div style="flex:1;min-width:0;padding-right:8px">
        <div style="font-weight:600;font-size:13px;margin-bottom:2px">${cat}</div>
        <div style="font-size:12px;color:${over?"var(--r)":warn?"var(--y)":"var(--m)"}">
          Spent: ${fmt(spent)} ${over?"🔴 over":warn?"🟡 near":""}
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
        <input type="number" id="${safeId}" inputmode="decimal"
          value="${budget}" min="0" step="100"
          style="width:90px;font-size:16px;padding:9px 10px;text-align:right"
          onkeydown="if(event.key==='Enter')saveBudget('${cat}')"/>
        <button class="bg" onclick="saveBudget('${cat}')" style="padding:10px 12px;font-size:15px;border-radius:10px">✓</button>
      </div>
    </div>`;
  }).join("");
}

// ── Render: dynamic content (dashboard & reports) ──
function renderDynamic(){
  if(S.tab===1)q("content").innerHTML=renderDashboard();
  if(S.tab===2)q("content").innerHTML=renderReports();
}

function renderDashboard(){
  const ct=catTotals();const ts=totalSpend();const tb=totalBudget();
  const fb=generateFeedback();
  return`
  <div class="sgrid">
    ${[["Total Spent",fmt(ts),"#6366F1"],["Budget Left",fmt(Math.max(0,tb-ts)),"#10B981"],["Entries",S.expenses.length,"#F59E0B"]].map(([l,v,c])=>`
    <div class="card" style="text-align:center;padding:14px 8px">
      <div style="font-size:11px;color:var(--m);margin-bottom:4px">${l}</div>
      <div style="font-size:20px;font-weight:800;color:${c}">${v}</div>
    </div>`).join("")}
  </div>
  <p style="font-weight:700;font-size:15px;margin-bottom:10px">By Category</p>
  <div class="card" style="overflow:hidden;padding:0;margin-bottom:20px">
  ${Object.entries(S.cats).map(([cat,ci],i,arr)=>{
    const spent=ct[cat]||0;const budget=S.budgets[cat]||0;if(!spent&&!budget)return"";
    const pct=budget>0?Math.min((spent/budget)*100,100):0;
    const over=spent>budget&&budget>0;const warn=!over&&pct>75&&budget>0;
    return`<div style="padding:13px 16px;${i<arr.length-1?"border-bottom:1px solid var(--b)":""}">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="tile" style="background:${S.dark?ci.dark:ci.light}">${ci.icon}</div>
        <div style="flex:1">
          <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px">
            <span style="font-weight:600;font-size:13px">${cat}</span>
            <div style="display:flex;gap:5px;align-items:center">
              ${over?`<span class="badge" style="background:${S.dark?"#3B1A1A":"#FEF0EE"};color:var(--r)">over!</span>`:""}
              ${warn?`<span class="badge" style="background:${S.dark?"#3B2A00":"#FFFBEB"};color:var(--y)">near!</span>`:""}
              <span style="font-size:13px;font-weight:700;color:${over?"var(--r)":"var(--t)"}">${fmt(spent)}</span>
              ${budget>0?`<span style="font-size:11px;color:var(--m)">/ ${fmt(budget)}</span>`:""}
            </div>
          </div>
          <div class="bwrap"><div class="bfill" style="width:${pct}%;background:${over?"var(--r)":warn?"var(--y)":ci.color}"></div></div>
        </div>
      </div>
    </div>`;
  }).join("")}
  </div>
  <div class="card" style="padding:18px;background:${S.dark?"#1A1040":"#F5F3FF"};border-color:${S.dark?"#3B2A80":"#C4B5FD"}">
    <p style="font-weight:800;font-size:15px;color:${S.dark?"#C4B5FD":"#4C1D95"}">💡 Spending Insights</p>
    <p style="font-size:12px;color:${S.dark?"#A78BFA":"#7C3AED"};margin:3px 0 14px">Based on your actual spending</p>
    <div class="fb-box" style="background:${S.dark?"#0F0A2A":"#EDE9FE"}">
      ${fb.map(f=>`<div class="fb-item">
        <div style="font-size:22px;flex-shrink:0;margin-top:1px">${f.icon}</div>
        <div><div style="font-size:12px;font-weight:700;color:${S.dark?"#C4B5FD":"#4C1D95"};margin-bottom:3px">${f.label}</div>
        <div style="font-size:12.5px;color:${S.dark?"#DDD6FE":"#3730A3"};line-height:1.6">${f.text}</div></div>
      </div>`).join("")}
    </div>
  </div>`;
}

function renderReports(){
  const pg=S.expenses.reduce((acc,e)=>{const k=getPKey(e.date);if(!acc[k])acc[k]={};acc[k][e.cat]=(acc[k][e.cat]||0)+e.amount;return acc;},{});
  const sorted=Object.keys(pg).sort().reverse();
  return`
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:10px;flex-wrap:wrap">
    <div class="pill-bar" style="flex:1">
      ${["weekly","monthly","quarterly","yearly"].map(p=>`<button class="pill ${S.period===p?"on":""}" onclick="S.period='${p}';renderDynamic()">${p.charAt(0).toUpperCase()+p.slice(1)}</button>`).join("")}
    </div>
    <div style="display:flex;gap:8px;flex-shrink:0">
      <label class="bp" style="display:flex;align-items:center;gap:5px;cursor:pointer;padding:10px 14px;font-size:13px;border-radius:12px;font-weight:600">
        ⬆ Import<input type="file" accept=".xls,.xlsx,.csv,.tsv" onchange="importFile(this)"/>
      </label>
      <button class="bg" onclick="downloadExcel()" style="padding:10px 14px;font-size:13px">⬇ Export</button>
    </div>
  </div>
  ${!sorted.length?`<div class="card" style="padding:32px;text-align:center;color:var(--m)">No data yet — add some expenses first!</div>`:""}
  ${sorted.map(period=>{
    const data=pg[period];const total=Object.values(data).reduce((a,b)=>a+b,0);
    return`<div class="card" style="margin-bottom:14px;padding:16px">
      <div style="display:flex;justify-content:space-between;margin-bottom:14px">
        <span style="font-weight:700;font-size:15px">${period}</span>
        <span style="font-weight:800;color:var(--a)">${fmt(total)}</span>
      </div>
      ${Object.entries(data).sort((a,b)=>b[1]-a[1]).map(([cat,amt])=>{
        const ci=S.cats[cat]||DC.Other;const pct=Math.round((amt/total)*100);
        return`<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
          <span style="font-size:18px;width:24px;text-align:center;flex-shrink:0">${ci.icon}</span>
          <span style="font-size:13px;width:80px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${cat}</span>
          <div class="bwrap" style="flex:1"><div class="bfill" style="width:${pct}%;background:${ci.color}"></div></div>
          <span style="font-size:12px;color:var(--m);flex-shrink:0;min-width:90px;text-align:right">${fmt(amt)} (${pct}%)</span>
        </div>`;
      }).join("")}
    </div>`;
  }).join("")}`;
}

function render(){setTab(S.tab);}
</script>
</body>
</html>
