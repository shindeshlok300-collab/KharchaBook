<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Expenses"/>
<meta name="theme-color" content="#6366F1"/>
<meta name="description" content="Smart personal expense tracker with cloud sync"/>
<link rel="manifest" id="pwa-manifest"/>
<title>Smart Expense Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--a:#6366F1;--g:#10B981;--r:#E85D4A;--y:#F59E0B;--rad:14px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;transition:background .2s,color .2s}
body.light{--bg:#F8FAFC;--s:#fff;--s2:#F1F5F9;--b:rgba(0,0,0,0.08);--t:#0F172A;--m:#64748B}
body.dark{--bg:#0F172A;--s:#1E293B;--s2:#263045;--b:rgba(255,255,255,0.08);--t:#F1F5F9;--m:#94A3B8}
body{background:var(--bg);color:var(--t)}
input,select,textarea{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:16px;color:var(--t);background:var(--s2);border:1px solid var(--b);border-radius:12px;padding:13px 14px;width:100%;display:block;-webkit-appearance:none;appearance:none;outline:none;touch-action:manipulation;-webkit-user-select:text;user-select:text}
input:focus,select:focus{border-color:var(--a);background:var(--s)}
input[type=color]{padding:4px;height:46px;cursor:pointer}
input[type=file]{display:none}
input[type=date]{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
button{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;font-weight:600;border:none;border-radius:12px;padding:13px 18px;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;-webkit-appearance:none;transition:opacity .15s}
button:active{opacity:.75}
.bp{background:var(--a);color:#fff}
.bg{background:var(--g);color:#fff}
.br{background:var(--r);color:#fff}
.bgh{background:var(--s2);color:var(--m);border:1px solid var(--b)}
.card{background:var(--s);border:1px solid var(--b);border-radius:var(--rad)}
.row{display:flex;align-items:center;gap:12px;padding:13px 16px}
.badge{border-radius:999px;padding:3px 9px;font-size:11px;font-weight:700}
.pill-bar{display:flex;background:var(--s2);border-radius:999px;padding:4px;gap:2px;overflow-x:auto;scrollbar-width:none}
.pill-bar::-webkit-scrollbar{display:none}
.pill{background:transparent;color:var(--m);border-radius:999px;padding:8px 14px;font-size:13px;font-weight:500;border:none;cursor:pointer;white-space:nowrap;touch-action:manipulation}
.pill.on{background:#1E293B;color:#fff;font-weight:700}
body.dark .pill.on{background:#334155}
.tile{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.bwrap{height:8px;background:var(--s2);border-radius:4px;overflow:hidden;margin-top:6px}
.bfill{height:100%;border-radius:4px}
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
#toast{position:fixed;top:max(env(safe-area-inset-top),16px);left:50%;transform:translateX(-50%);background:#1E293B;color:#fff;border-radius:999px;padding:10px 22px;font-size:13px;font-weight:600;z-index:9999;white-space:nowrap;box-shadow:0 4px 24px rgba(0,0,0,.25);opacity:0;transition:opacity .25s;pointer-events:none}
#toast.show{opacity:1}
#sync{position:fixed;top:max(env(safe-area-inset-top),12px);right:14px;font-size:11px;font-weight:700;border-radius:999px;padding:4px 10px;z-index:998;opacity:0;transition:all .3s;pointer-events:none}
#sync.on{opacity:1}
#sync.saving{background:#FFFBEB;color:#6B3A00}
#sync.saved{background:#ECFDF5;color:#065F46}
#sync.err{background:#FEF0EE;color:#7A2518}
#sync.offline{background:#F1F5F9;color:#64748B}
#auth-wrap,#forgot-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
#forgot-wrap{display:none}
.acard{background:var(--s);border:1px solid var(--b);border-radius:20px;padding:32px 26px;width:100%;max-width:400px}
.ath{font-size:22px;font-weight:800;margin-bottom:4px}
.asub{font-size:13px;color:var(--m);margin-bottom:22px;line-height:1.5}
.atabs{display:flex;background:var(--s2);border-radius:999px;padding:4px;gap:2px;margin-bottom:20px}
.atab{flex:1;text-align:center;padding:9px;border:none;border-radius:999px;font-size:14px;font-weight:500;background:transparent;color:var(--m);cursor:pointer;touch-action:manipulation}
.atab.on{background:var(--s);color:var(--t);font-weight:700;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.amsg{font-size:13px;border-radius:10px;padding:10px 14px;margin-bottom:14px;line-height:1.5;display:none}
.amsg.err{background:#FEF0EE;color:#7A2518;display:block}
.amsg.ok{background:#ECFDF5;color:#065F46;display:block}
.aor{display:flex;align-items:center;gap:10px;margin:16px 0}
.aor-l{flex:1;height:1px;background:var(--b)}
.flink{text-align:center;font-size:13px;color:var(--a);cursor:pointer;margin-top:12px;font-weight:600;touch-action:manipulation}
#app-wrap{display:none}
#shell{max-width:660px;margin:0 auto;padding:16px 16px 110px}
#bnav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--s);border-top:1px solid var(--b);padding:8px 0 calc(8px + env(safe-area-inset-bottom));z-index:200;justify-content:space-around}
#bnav button{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:600;color:var(--m);padding:4px 10px;min-width:56px;touch-action:manipulation;border-radius:10px}
#bnav button.on{color:var(--a)}
.ni{font-size:22px}
@media(max-width:599px){#bnav{display:flex}#top-tabs{display:none!important}#shell{padding:12px 12px 100px}}
@media(min-width:600px){#bnav{display:none!important}#top-tabs{display:flex!important}}
.fb-box{background:var(--s2);border-radius:12px;padding:16px;margin-top:14px}
.fb-item{display:flex;gap:10px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--b)}
.fb-item:last-child{border:none;margin:0;padding:0}
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--m);font-size:14px;gap:10px}
</style>
</head>
<body class="light">
<div id="toast"></div>
<div id="sync"></div>

<!-- FORGOT PASSWORD -->
<div id="forgot-wrap">
  <div class="acard">
    <div style="font-size:36px;margin-bottom:8px">🔑</div>
    <div class="ath">Reset password</div>
    <div class="asub">Enter your email and we'll send a reset link.</div>
    <div id="forgot-msg"></div>
    <div style="margin-bottom:14px">
      <input type="email" id="forgot-email" placeholder="Email address" autocomplete="email" style="font-size:16px"/>
    </div>
    <button class="bp" id="forgot-btn" style="width:100%;padding:14px;font-size:16px" onclick="sendReset()">Send reset link</button>
    <div class="flink" onclick="showAuth()" style="margin-top:14px">← Back to login</div>
  </div>
</div>

<!-- AUTH -->
<div id="auth-wrap">
  <div class="acard">
    <div style="font-size:36px;margin-bottom:8px">💸</div>
    <div class="ath">Expense Tracker</div>
    <div class="asub">Track spending, set budgets, get insights — synced across all your devices.</div>
    <div class="atabs">
      <button class="atab on" id="atab-login" onclick="setAuthMode('login')">Login</button>
      <button class="atab" id="atab-signup" onclick="setAuthMode('signup')">Sign Up</button>
    </div>
    <div id="auth-msg"></div>
    <div style="display:flex;flex-direction:column;gap:12px;margin-bottom:16px">
      <input type="email" id="f-email" placeholder="Email address" autocomplete="email" style="font-size:16px"/>
      <input type="password" id="f-pw" placeholder="Password" autocomplete="current-password" style="font-size:16px"/>
      <input type="password" id="f-pw2" placeholder="Confirm password" autocomplete="new-password" style="display:none;font-size:16px"/>
    </div>
    <button class="bp" id="auth-btn" style="width:100%;padding:14px;font-size:16px" onclick="authSubmit()">Login</button>
    <div class="flink" id="forgot-link" onclick="showForgot()">Forgot password?</div>
    <div class="aor"><div class="aor-l"></div><span style="font-size:11px;color:var(--m)">or</span><div class="aor-l"></div></div>
    <button class="bgh" onclick="goOffline()" style="width:100%;padding:13px;font-size:14px">Continue offline (local only)</button>
  </div>
</div>

<!-- APP -->
<div id="app-wrap">
  <div id="shell">
    <div id="hdr"></div>
    <div id="top-tabs" class="pill-bar" style="margin-bottom:18px;display:none"></div>

    <!-- ADD TAB -->
    <div id="tab-add" style="display:none">
      <div class="card" style="padding:18px;margin-bottom:18px">
        <p style="font-weight:700;font-size:16px;margin-bottom:16px">New Expense</p>
        <div style="display:flex;flex-direction:column;gap:12px">
          <div>
            <input type="text" id="i-desc" placeholder="What did you spend on? (e.g. Zomato)" autocomplete="off" autocorrect="off" autocapitalize="sentences" spellcheck="false" style="font-size:16px"/>
            <div id="cat-preview" style="font-size:12px;font-weight:600;margin-top:6px;min-height:18px"></div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <input type="number" id="i-amt" placeholder="Amount (₹)" inputmode="decimal" min="0" step="any" style="font-size:16px"/>
            <input type="date" id="i-date" style="font-size:16px"/>
          </div>
          <select id="i-cat" style="font-size:16px;background:var(--s2);color:var(--t)"></select>
          <button class="bp" id="btn-add" style="width:100%;padding:15px;font-size:16px">+ Add Expense</button>
        </div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <p style="font-weight:700;font-size:15px">Recent Expenses</p>
        <span id="exp-count" style="font-size:12px;color:var(--m)"></span>
      </div>
      <div class="card" style="overflow:hidden;padding:0" id="recent-list"></div>
    </div>

    <!-- BUDGETS TAB -->
    <div id="tab-budgets" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <p style="font-size:13px;color:var(--m)">Edit amount then tap ✓</p>
        <button class="bp" id="btn-newcat" style="font-size:13px;padding:10px 16px">+ New category</button>
      </div>
      <div id="newcat-form" style="display:none">
        <div class="card" style="padding:18px;margin-bottom:14px;border-color:var(--a)">
          <p style="font-weight:700;font-size:14px;color:var(--a);margin-bottom:14px">Add Custom Category</p>
          <div style="display:flex;flex-direction:column;gap:10px">
            <input type="text" id="i-newcat" placeholder="Category name" autocomplete="off" style="font-size:16px"/>
            <div style="display:flex;gap:10px">
              <input type="text" id="i-newicon" placeholder="Emoji" value="🏷" style="width:80px;text-align:center;font-size:20px"/>
              <input type="color" id="i-newcolor" value="#6366F1" style="flex:1"/>
            </div>
            <div style="display:flex;gap:10px">
              <button class="bp" id="btn-addcat" style="flex:1">Add</button>
              <button class="bgh" id="btn-cancelcat" style="flex:1">Cancel</button>
            </div>
          </div>
        </div>
      </div>
      <div class="card" style="overflow:hidden;padding:0" id="bud-list"></div>
    </div>

    <!-- DYNAMIC TABS -->
    <div id="content" style="display:none"></div>
  </div>
  <nav id="bnav"></nav>
</div>

<script>
// ── PWA manifest (inline) ──
const manifest={name:"Smart Expense Tracker",short_name:"Expenses",start_url:"/",display:"standalone",background_color:"#F8FAFC",theme_color:"#6366F1",icons:[{src:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%236366F1'/><text y='.9em' font-size='80' x='10'>💸</text></svg>",sizes:"any",type:"image/svg+xml"}]};
const mblob=new Blob([JSON.stringify(manifest)],{type:"application/json"});
document.getElementById("pwa-manifest").href=URL.createObjectURL(mblob);

// ── Service Worker ──
if("serviceWorker" in navigator){
  const swCode=`
const CACHE="et-v1";
const ASSETS=["/"];
self.addEventListener("install",e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS))));
self.addEventListener("fetch",e=>{
  if(e.request.method!=="GET")return;
  e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)));
});`;
  const swBlob=new Blob([swCode],{type:"text/javascript"});
  navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(()=>{});
}

// ── Supabase ──
const {createClient}=supabase;
const sb=createClient("https://bymzxsrlfirxynwidoyc.supabase.co","sb_publishable_SqZJ79X9qhfThpaWy8KXMw_glLvyx27");

const TABS=[{l:"Add",i:"➕"},{l:"Dashboard",i:"📊"},{l:"Reports",i:"📅"},{l:"Budgets",i:"🎯"}];

const DC={
  Food:{kw:["zomato","swiggy","food","restaurant","cafe","lunch","dinner","breakfast","chai","pizza","burger","meal","eat","grocery","blinkit","zepto","bigbasket","milk","vegetable","fruit","snack","coffee","tea","dine"],color:"#E85D4A",light:"#FEF0EE",dark:"#7A2518",icon:"🍽"},
  Transport:{kw:["uber","ola","rapido","auto","cab","taxi","metro","bus","train","fuel","petrol","diesel","parking","flight","irctc","ticket","travel"],color:"#3B82F6",light:"#EFF6FF",dark:"#1E3A6E",icon:"🚗"},
  Entertainment:{kw:["netflix","prime","hotstar","spotify","youtube","movie","film","cinema","pvr","inox","game","gaming","concert","show","jiocinema","subscription","ott"],color:"#8B5CF6",light:"#F5F3FF",dark:"#3B1F6E",icon:"🎬"},
  Shopping:{kw:["amazon","flipkart","myntra","ajio","meesho","clothes","shirt","dress","shoe","bag","watch","jewel","nykaa","purse","accessory","fashion","apparel","mall"],color:"#EC4899",light:"#FDF2F8",dark:"#6D1A42",icon:"🛍"},
  Health:{kw:["gym","fitness","yoga","medicine","pharmacy","doctor","hospital","clinic","medical","apollo","1mg","netmeds","health","wellness","supplement","vitamin"],color:"#10B981",light:"#ECFDF5",dark:"#065F46",icon:"💊"},
  Utilities:{kw:["electricity","water","internet","wifi","jio","airtel","vi","phone","bill","recharge","gas","lpg","maintenance","rent","emi","loan"],color:"#F59E0B",light:"#FFFBEB",dark:"#6B3A00",icon:"⚡"},
  Education:{kw:["course","udemy","coursera","book","study","school","college","tuition","class","exam","fee","notebook","learn","skill","training"],color:"#06B6D4",light:"#ECFEFF",dark:"#0E4C5A",icon:"📚"},
  Other:{kw:[],color:"#6B7280",light:"#F9FAFB",dark:"#374151",icon:"📦"},
};
const DB={Food:8000,Transport:3000,Entertainment:2000,Shopping:5000,Health:2000,Utilities:3000,Education:2000,Other:1000};

let user=null,offline=false,syncTmr=null,isOnline=navigator.onLine;
let offlineQueue=JSON.parse(localStorage.getItem("et_queue")||"[]");

let S={
  dark:JSON.parse(localStorage.getItem("et_dark")||"false"),
  tab:0,
  expenses:JSON.parse(localStorage.getItem("et_exp")||"[]"),
  cats:JSON.parse(localStorage.getItem("et_cats")||JSON.stringify(DC)),
  budgets:JSON.parse(localStorage.getItem("et_bud")||JSON.stringify(DB)),
  period:"monthly",
};

// ── Online/offline detection ──
window.addEventListener("online",()=>{isOnline=true;flushQueue();updateSyncIndicator();});
window.addEventListener("offline",()=>{isOnline=false;updateSyncIndicator();});
function updateSyncIndicator(){if(!isOnline)showSync("offline");}

// ── Utils ──
const fmt=n=>"₹"+Math.round(n).toLocaleString("en-IN");
const q=id=>document.getElementById(id);
function categorize(desc){
  const d=desc.toLowerCase();
  for(const[c,i]of Object.entries(S.cats)){if(c==="Other")continue;if((i.kw||[]).some(k=>d.includes(k)))return c;}
  return"Other";
}
function getPKey(d){
  if(S.period==="weekly"){const dt=new Date(d),dy=dt.getDay(),df=dt.getDate()-dy+(dy===0?-6:1);return new Date(dt.setDate(df)).toISOString().slice(0,10);}
  if(S.period==="monthly")return d.slice(0,7);
  if(S.period==="quarterly"){const m=parseInt(d.slice(5,7)),y=d.slice(0,4);return`${y}-Q${Math.ceil(m/3)}`;}
  return d.slice(0,4);
}
function catTotals(){return S.expenses.reduce((a,e)=>{a[e.cat]=(a[e.cat]||0)+e.amount;return a;},{});}
const totalSpend=()=>Object.values(catTotals()).reduce((a,b)=>a+b,0);
const totalBudget=()=>Object.values(S.budgets).reduce((a,b)=>a+b,0);

let toastTmr;
function toast(msg){const el=q("toast");el.textContent=msg;el.classList.add("show");clearTimeout(toastTmr);toastTmr=setTimeout(()=>el.classList.remove("show"),2600);}
function showSync(st){
  const el=q("sync");
  const labels={saving:"⏳ Saving",saved:"✓ Saved",err:"⚠ Error",offline:"📶 Offline"};
  el.className="sync on "+st;el.textContent=labels[st]||"";
  if(st==="saved")setTimeout(()=>{el.className="sync";},2200);
}
function applyTheme(){document.body.className=S.dark?"dark":"light";}

// ── Local cache helpers ──
function cacheExpenses(){localStorage.setItem("et_exp",JSON.stringify(S.expenses));}
function cacheSettings(){
  localStorage.setItem("et_bud",JSON.stringify(S.budgets));
  localStorage.setItem("et_cats",JSON.stringify(S.cats));
  localStorage.setItem("et_dark",JSON.stringify(S.dark));
}

// ── Supabase: expenses ──
async function dbAddExpense(exp){
  if(!user||offline)return;
  if(!isOnline){offlineQueue.push({action:"add",exp});localStorage.setItem("et_queue",JSON.stringify(offlineQueue));return;}
  showSync("saving");
  try{
    const{error}=await sb.from("expenses").insert({
      user_id:user.id,description:exp.desc,amount:exp.amount,
      category:exp.cat,date:exp.date,created_at:new Date().toISOString()
    });
    if(error)throw error;
    showSync("saved");
  }catch(e){showSync("err");console.warn(e);}
}

async function dbDeleteExpense(id){
  if(!user||offline)return;
  if(!isOnline){offlineQueue.push({action:"del",id});localStorage.setItem("et_queue",JSON.stringify(offlineQueue));return;}
  try{await sb.from("expenses").delete().eq("id",id).eq("user_id",user.id);}
  catch(e){console.warn(e);}
}

async function dbUpdateExpense(id,amount){
  if(!user||offline)return;
  if(!isOnline){offlineQueue.push({action:"update",id,amount});localStorage.setItem("et_queue",JSON.stringify(offlineQueue));return;}
  showSync("saving");
  try{
    const{error}=await sb.from("expenses").update({amount}).eq("id",id).eq("user_id",user.id);
    if(error)throw error;
    showSync("saved");
  }catch(e){showSync("err");console.warn(e);}
}

async function dbSaveSettings(){
  if(!user||offline)return;
  if(!isOnline)return;
  showSync("saving");
  try{
    const{error}=await sb.from("user_settings").upsert({
      user_id:user.id,budgets:S.budgets,categories:S.cats,
      dark_mode:S.dark,updated_at:new Date().toISOString()
    },{onConflict:"user_id"});
    if(error)throw error;
    showSync("saved");
  }catch(e){showSync("err");console.warn(e);}
}

async function flushQueue(){
  if(!user||!isOnline||offlineQueue.length===0)return;
  showSync("saving");
  const q2=[...offlineQueue];offlineQueue=[];
  localStorage.setItem("et_queue","[]");
  for(const op of q2){
    try{
      if(op.action==="add")await sb.from("expenses").insert({user_id:user.id,description:op.exp.desc,amount:op.exp.amount,category:op.exp.cat,date:op.exp.date,created_at:new Date().toISOString()});
      if(op.action==="del")await sb.from("expenses").delete().eq("id",op.id).eq("user_id",user.id);
      if(op.action==="update")await sb.from("expenses").update({amount:op.amount}).eq("id",op.id).eq("user_id",user.id);
    }catch(e){offlineQueue.push(op);}
  }
  localStorage.setItem("et_queue",JSON.stringify(offlineQueue));
  showSync("saved");
  toast(`Synced ${q2.length} queued changes`);
}

async function loadCloud(){
  if(!user)return;
  try{
    // load expenses
    const{data:exps,error:ee}=await sb.from("expenses").select("*").eq("user_id",user.id).order("date",{ascending:false}).order("created_at",{ascending:false});
    if(!ee&&exps){
      S.expenses=exps.map(e=>({id:e.id,desc:e.description,amount:parseFloat(e.amount),cat:e.category,date:e.date}));
      cacheExpenses();
    }
    // load settings
    const{data:sett,error:se}=await sb.from("user_settings").select("*").eq("user_id",user.id).single();
    if(!se&&sett){
      if(sett.budgets&&Object.keys(sett.budgets).length)S.budgets=sett.budgets;
      if(sett.categories&&Object.keys(sett.categories).length)S.cats=sett.categories;
      if(sett.dark_mode!==null)S.dark=sett.dark_mode;
      cacheSettings();
    }
    // migrate old user_data blob if exists
    await migrateOldData();
  }catch(e){console.warn("Cloud load failed",e);}
}

async function migrateOldData(){
  try{
    const{data}=await sb.from("user_data").select("data").eq("user_id",user.id).single();
    if(!data)return;
    const old=JSON.parse(data.data);
    if(!old.expenses||old.expenses.length===0)return;
    // insert old expenses that don't exist yet
    const inserts=old.expenses.map(e=>({user_id:user.id,description:e.desc,amount:e.amount,category:e.cat||e.category||"Other",date:e.date,created_at:new Date().toISOString()}));
    await sb.from("expenses").upsert(inserts,{ignoreDuplicates:true});
    // delete old blob
    await sb.from("user_data").delete().eq("user_id",user.id);
    toast("Migrated your old data ✓");
  }catch(e){/* no old data, fine */}
}

async function addExpense(){
  const desc=q("i-desc").value.trim();
  const amt=parseFloat(q("i-amt").value);
  const date=q("i-date").value;
  const cat=q("i-cat").value||categorize(desc);
  if(!desc||isNaN(amt)||amt<=0){toast("Enter a valid description and amount.");return;}
  const exp={id:user?undefined:Date.now().toString(),desc,amount:amt,date,cat};
  // optimistic UI
  S.expenses.unshift({...exp,id:exp.id||"pending-"+Date.now()});
  cacheExpenses();
  q("i-desc").value="";q("i-amt").value="";q("i-cat").value="";q("cat-preview").textContent="";
  renderRecentList();q("exp-count").textContent=S.expenses.length+" total";
  toast(`Added to ${cat}!`);
  // sync to DB (get real UUID back)
  if(user&&!offline){
    if(isOnline){
      showSync("saving");
      try{
        const{data,error}=await sb.from("expenses").insert({
          user_id:user.id,description:desc,amount:amt,category:cat,date,created_at:new Date().toISOString()
        }).select().single();
        if(error)throw error;
        // replace pending id with real uuid
        S.expenses=S.expenses.map(e=>e.id===("pending-"+Date.now().toString().slice(0,-3))||e.desc===desc&&e.amount===amt?{...e,id:data.id}:e);
        cacheExpenses();showSync("saved");
      }catch(e){showSync("err");console.warn(e);}
    }else{
      offlineQueue.push({action:"add",exp:{desc,amount:amt,cat,date}});
      localStorage.setItem("et_queue",JSON.stringify(offlineQueue));
      showSync("offline");
    }
  }
}

function importFile(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    try{
      const lines=ev.target.result.split("\n").map(l=>l.trim()).filter(Boolean);
      const data=lines.filter(l=>/^\d{4}-\d{2}-\d{2}/.test(l)).map(l=>{
        const[date,desc,cat,amt]=l.split("\t");const amount=parseFloat(amt);
        if(!date||!desc||isNaN(amount))return null;
        return{desc:desc.trim(),amount,cat:(cat||"Other").trim(),date:date.trim()};
      }).filter(Boolean);
      if(!data.length){toast("No valid data found");return;}
      // add to UI optimistically
      const newExps=data.map(e=>({id:"import-"+Date.now()+Math.random(),...e}));
      S.expenses=[...newExps,...S.expenses];
      cacheExpenses();renderRecentList();
      q("exp-count").textContent=S.expenses.length+" total";
      toast(`Imported ${data.length} expenses!`);
      // sync to DB
      if(user&&!offline&&isOnline){
        showSync("saving");
        const inserts=data.map(e=>({user_id:user.id,description:e.desc,amount:e.amount,category:e.cat,date:e.date,created_at:new Date().toISOString()}));
        await sb.from("expenses").insert(inserts);
        await loadCloud();renderRecentList();showSync("saved");
      }
    }catch(e){toast("Failed to parse file.");}
    input.value="";
  };
  reader.readAsText(file);
}

// ── Feedback engine ──
function generateFeedback(){
  const ct=catTotals();const ts=totalSpend();const tb=totalBudget();const items=[];
  const pct=tb>0?Math.round((ts/tb)*100):0;
  if(pct===0){items.push({icon:"👋",label:"No data yet",text:"Add some expenses to get personalised feedback on your spending."});return items;}
  if(pct<60)items.push({icon:"🟢",label:"Great overall",text:`You've used ${pct}% of your total budget — well in control!`});
  else if(pct<85)items.push({icon:"🟡",label:"Doing okay",text:`You're at ${pct}% of your total budget. A few categories need attention.`});
  else if(pct<100)items.push({icon:"🟠",label:"Getting close",text:`${pct}% of budget used. Pull back on discretionary spending.`});
  else items.push({icon:"🔴",label:"Over budget",text:`Exceeded total budget by ${fmt(ts-tb)}. Review your biggest categories.`});
  const tips={Food:"Try cooking at home 2–3 days a week or switch to weekly BigBasket orders.",Transport:"Consider the metro or Rapido bike taxis to cut costs.",Entertainment:"Rotate OTT subscriptions instead of keeping all active.",Shopping:"Try a 24-hour rule before buying.",Health:"Compare prices on 1mg vs Apollo — savings can be 20–30%.",Utilities:"Use PhonePe or GPay cashback for bill payments.",Education:"Wait for Udemy sales — courses go for ₹399–499.",Other:"Review if any items here belong to a specific category."};
  const over=[],near=[];
  for(const[cat,spent]of Object.entries(ct)){
    const bud=S.budgets[cat]||0;if(!bud)continue;
    const p=Math.round((spent/bud)*100);
    if(p>100)over.push({cat,spent,bud,p});
    else if(p>75)near.push({cat,spent,bud,p});
  }
  over.sort((a,b)=>b.p-a.p);
  if(over.length){
    const top=over[0];
    items.push({icon:"🚨",label:`${top.cat} is over budget (${top.p}%)`,text:`Spent ${fmt(top.spent)} against ${fmt(top.bud)}. ${tips[top.cat]||"Reduce spend here."}`});
    if(over.length>1)items.push({icon:"⚠️",label:`${over.length-1} more over budget`,text:over.slice(1).map(o=>`${o.cat}: ${fmt(o.spent)} / ${fmt(o.bud)}`).join(" · ")});
  }
  if(near.length)items.push({icon:"🔔",label:"Nearing limit",text:near.map(n=>`${n.cat} at ${n.p}%`).join(", ")+". Slow down to finish the month comfortably."});
  const sorted=Object.entries(ct).sort((a,b)=>b[1]-a[1]);
  if(sorted.length&&ts>0){const[tc,ta]=sorted[0];const share=Math.round((ta/ts)*100);if(share>40)items.push({icon:"📌",label:`${tc} dominates (${share}% of total)`,text:`${fmt(ta)} on ${tc}. Consider if this matches your priorities.`});}
  const saved=tb-ts;
  if(saved>0)items.push({icon:"💡",label:"Savings opportunity",text:`${fmt(saved)} left in budget. Consider moving some to savings — even ₹500/month adds up.`});
  return items;
}

    <div class="fb-box" style="background:${S.dark?"#0F0A2A":"#EDE9FE"}">
      ${fb.map(f=>`<div class="fb-item">
        <div style="font-size:22px;flex-shrink:0;margin-top:1px">${f.icon}</div>
        <div><div style="font-size:12px;font-weight:700;color:${S.dark?"#C4B5FD":"#4C1D95"};margin-bottom:3px">${f.label}</div>
        <div style="font-size:12.5px;color:${S.dark?"#DDD6FE":"#3730A3"};line-height:1.6">${f.text}</div></div>
      </div>`).join("")}
    </div>
  </div>`;
}

function renderReports(){
  const pg=S.expenses.reduce((acc,e)=>{const k=getPKey(e.date);if(!acc[k])acc[k]={};acc[k][e.cat]=(acc[k][e.cat]||0)+e.amount;return acc;},{});
  const sorted=Object.keys(pg).sort().reverse();
  return`
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:10px;flex-wrap:wrap">
    <div class="pill-bar" style="flex:1">
      ${["weekly","monthly","quarterly","yearly"].map(p=>`<button class="pill ${S.period===p?"on":""}" onclick="S.period='${p}';renderDynamic()">${p.charAt(0).toUpperCase()+p.slice(1)}</button>`).join("")}
    </div>
    <div style="display:flex;gap:8px;flex-shrink:0">
      <label class="bp" style="display:flex;align-items:center;gap:5px;cursor:pointer;padding:10px 14px;font-size:13px;border-radius:12px;font-weight:600">
        ⬆ Import<input type="file" accept=".xls,.xlsx,.csv,.tsv" onchange="importFile(this)"/>
      </label>
      <button class="bg" onclick="downloadExcel()" style="padding:10px 14px;font-size:13px">⬇ Export</button>
    </div>
  </div>
  ${!sorted.length?`<div class="card" style="padding:32px;text-align:center;color:var(--m)">No data yet — add some expenses first!</div>`:""}
  ${sorted.map(period=>{
    const data=pg[period];const total=Object.values(data).reduce((a,b)=>a+b,0);
    return`<div class="card" style="margin-bottom:14px;padding:16px">
      <div style="display:flex;justify-content:space-between;margin-bottom:14px">
        <span style="font-weight:700;font-size:15px">${period}</span>
        <span style="font-weight:800;color:var(--a)">${fmt(total)}</span>
      </div>
      ${Object.entries(data).sort((a,b)=>b[1]-a[1]).map(([cat,amt])=>{
        const ci=S.cats[cat]||DC.Other;const pct=Math.round((amt/total)*100);
        return`<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
          <span style="font-size:18px;width:24px;text-align:center;flex-shrink:0">${ci.icon}</span>
          <span style="font-size:13px;width:80px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${cat}</span>
          <div class="bwrap" style="flex:1"><div class="bfill" style="width:${pct}%;background:${ci.color}"></div></div>
          <span style="font-size:12px;color:var(--m);flex-shrink:0;min-width:90px;text-align:right">${fmt(amt)} (${pct}%)</span>
        </div>`;
      }).join("")}
    </div>`;
  }).join("")}`;
}
</script>
</body>
</html>
